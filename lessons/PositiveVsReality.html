<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Debate: Positivity vs. Reality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .perspective-card { transition: all 0.3s ease; }
        .perspective-card:hover { transform: translateY(-4px); }

        /* Custom highlight for scientific/difficult words */
        .highlight-term {
            border-bottom: 2px dotted #14b8a6; /* Teal-500 */
            font-weight: 700;
            color: #0f172a; /* Slate-900 */
            cursor: help;
            transition: all 0.2s ease;
            position: relative;
            z-index: 10;
        }
        .highlight-term:hover {
            background-color: #ccfbf1; /* Teal-50 */
            border-radius: 2px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex flex-col overflow-hidden selection:bg-teal-200">

    <!-- Global Tooltip Element -->
    <div id="global-tooltip" class="fixed hidden z-50 bg-slate-900 text-white text-sm rounded-lg shadow-2xl p-4 max-w-xs pointer-events-none transition-opacity duration-200 opacity-0 border border-slate-700"></div>

    <!-- Header -->
    <header class="bg-slate-900 text-white p-5 shadow-lg flex justify-between items-center z-10 shrink-0 border-b-4 border-teal-500">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-white">Positivity vs. Reality</h1>
            <p class="text-slate-400 text-sm md:text-base mt-1">Navigating how we teach teenagers to handle life's harsh truths.</p>
        </div>
        <div class="hidden md:block">
            <span class="bg-teal-900/50 text-teal-300 px-4 py-2 rounded-full border border-teal-700/50 text-sm font-medium">
                Educational Psychology
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden max-w-7xl w-full mx-auto bg-slate-50 shadow-2xl">
        
        <!-- Sidebar Navigation -->
        <div class="w-full md:w-1/3 lg:w-1/4 border-r border-slate-200 overflow-y-auto relative bg-white flex flex-col">
            <div class="p-5 border-b border-slate-100 bg-slate-50">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Explore Scenarios</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-3" id="nav-container">
                <!-- Navigation items injected by JS -->
            </div>
            <div class="p-4 bg-slate-100 text-xs text-slate-500 text-center border-t border-slate-200">
                💡 <strong>Tip:</strong> Hover over dotted words to view psychological definitions.
            </div>
        </div>

        <!-- Main Display Area -->
        <div class="w-full md:w-2/3 lg:w-3/4 flex flex-col relative overflow-y-auto bg-slate-50/50">
            <div id="content-display" class="p-6 md:p-10 w-full h-full">
                <!-- Content injected by JS -->
            </div>
        </div>
    </main>

    <script>
        // --- DICTIONARY FOR SCIENTIFIC/COMPLEX TERMS ---
        const glossary = {
            "Positive Education": "An educational approach that blends traditional academic learning with the cultivation of happiness, well-being, and positive psychological traits.",
            "Toxic Positivity": "The overgeneralization of a happy, optimistic state across all situations, often resulting in the denial, minimization, or silencing of genuine human pain and trauma.",
            "Pragmatic Resilience": "The psychological ability to acknowledge harsh, unfair realities and process negative emotions naturally, while still taking practical, constructive steps forward.",
            "Tragic Optimism": "A concept coined by psychiatrist Viktor Frankl. It is the ability to maintain hope, find meaning, and act responsibly despite inescapable pain, loss, and suffering.",
            "Invalidates": "To reject, dismiss, or ignore the validity of someone's feelings, making them feel like their emotional response is 'wrong' or 'crazy' (often a form of gaslighting).",
            "Cognitive Dissonance": "The extreme mental discomfort experienced by someone holding contradictory beliefs. For example, believing 'good things happen to good people' while experiencing a situation where doing the right thing resulted in punishment.",
            "Learned Helplessness": "A condition discovered in psychology where an individual suffers from a sense of powerlessness, arising from persistent failure to succeed. They eventually stop trying to escape pain, even when opportunities arise.",
            "Systemic Awareness": "The sociological understanding of how larger structures, rules, power dynamics, and hierarchies (the 'system') dictate outcomes, rather than blaming individuals alone.",
            "Intrinsic Motivation": "Doing an activity for its inherent satisfaction, personal meaning, or joy, rather than for some separable consequence (like a reward, grade, or avoiding punishment)."
        };

        // Helper function to wrap words in the interactive tooltip class
        function term(phrase, dictionaryKey) {
            return `<span class="highlight-term" data-term="${dictionaryKey}">${phrase}</span>`;
        }

        // --- LESSON DATA ---
        const scenariosData = [
            {
                id: "intro",
                isIntro: true,
                title: "The Psychological Dilemma",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
                content: `
                    <div class="max-w-3xl mx-auto text-center fade-in pt-8">
                        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-teal-100 text-teal-600 mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
                        </div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-6">Does "Positive Thinking" Actually Work?</h2>
                        <p class="text-slate-600 text-lg leading-relaxed mb-8 text-left">
                            For decades, educators and parents have leaned into ${term("Positive Education", "Positive Education")}—the idea that teenagers should be taught to reframe difficulties, look on the bright side, and maintain optimism in the face of adversity. 
                        </p>
                        <p class="text-slate-600 text-lg leading-relaxed mb-10 text-left">
                            But reality is rarely purely positive. Betrayal, being framed, systemic unfairness, and harsh failures are normal parts of life. When we tell a teenager facing a brutal reality to "just be positive," we risk sliding into ${term("Toxic Positivity", "Toxic Positivity")}, which invalidates their genuine pain and leaves them utterly unprepared for real-world malice.
                        </p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left mb-10">
                            <div class="bg-white p-6 rounded-xl border border-rose-100 shadow-sm border-t-4 border-t-rose-400">
                                <h3 class="font-bold text-rose-800 mb-2">The Danger of Forced Positivity</h3>
                                <p class="text-sm text-slate-600">Teaching teens to ignore the bad makes them vulnerable. They may fail to recognize toxic relationships, struggle to set boundaries, and feel immense guilt when they cannot "smile through" severe trauma.</p>
                            </div>
                            <div class="bg-white p-6 rounded-xl border border-teal-100 shadow-sm border-t-4 border-t-teal-400">
                                <h3 class="font-bold text-teal-800 mb-2">The Alternative Approach</h3>
                                <p class="text-sm text-slate-600">Also known as ${term("Tragic Optimism", "Tragic Optimism")}, this alternative validates the harsh reality of suffering. It teaches teens to accept that the world can be unfair, while focusing on practical steps to protect themselves and grow.</p>
                            </div>
                        </div>

                        <button onclick="selectScenario(1)" class="px-8 py-4 bg-slate-900 text-white rounded-xl font-medium hover:bg-slate-800 transition-colors shadow-lg shadow-slate-900/20 flex items-center gap-2 mx-auto">
                            Explore Real-World Scenarios
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </button>
                    </div>
                `
            },
            {
                id: "scenario-1",
                title: "The Deep Betrayal",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/><line x1="15" y1="3" x2="9" y2="14"/></svg>`,
                context: "A close friend breaks the teenager's trust, sharing a deeply personal secret with the rest of the school for social clout.",
                approaches: [
                    {
                        type: "Forced Positivity",
                        color: "rose",
                        advice: `"Forgive and forget! Holding onto anger only hurts you. Maybe they didn't mean it, just focus on your true friends."`,
                        impact: `${term("Invalidates", "Invalidates")} the teenager's pain. Teaches them to suppress justified anger and tolerate severe boundary violations, leaving them vulnerable to future abuse.`
                    },
                    {
                        type: "Cynical Reality",
                        color: "slate",
                        advice: `"This is why you can never trust anyone. People are inherently selfish and will always stab you in the back eventually."`,
                        impact: "Validates the pain but leads to paranoia and extreme isolation. The teen may put up permanent walls, preventing future healthy relationships."
                    },
                    {
                        type: "Pragmatic Resilience",
                        color: "teal",
                        advice: `"What they did was deeply unfair and it makes complete sense that you are furious. You don't have to forgive them. Let's talk about how to manage the fallout."`,
                        impact: "Practices ${term('Pragmatic Resilience', 'Pragmatic Resilience')} by validating emotions, maintaining psychological safety, and teaching actionable boundary-setting without destroying hope for future connections."
                    }
                ]
            },
            {
                id: "scenario-2",
                title: "Being Framed",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
                context: "The teenager is blamed for a major mistake at their part-time job that a senior member actually committed. The boss refuses to listen to the truth.",
                approaches: [
                    {
                        type: "Forced Positivity",
                        color: "rose",
                        advice: `"Everything happens for a reason! Just take the high road, show them what a hard worker you are, and the truth will eventually come to light."`,
                        impact: "Creates massive ${term('Cognitive Dissonance', 'Cognitive Dissonance')}. The teen realizes 'the high road' often doesn't work against active malice, leading them to feel the educational advice they received is a lie."
                    },
                    {
                        type: "Cynical Reality",
                        color: "slate",
                        advice: `"The system is rigged. The people in power will always crush the little guy to protect themselves. There's no point in trying."`,
                        impact: "Breeds ${term('Learned Helplessness', 'Learned Helplessness')} and apathy. The teen gives up trying to advocate for themselves because they believe the outcome is predetermined."
                    },
                    {
                        type: "Pragmatic Resilience",
                        color: "teal",
                        advice: `"This is a harsh reality of hierarchical environments—people frame others to save themselves. Let's look at the facts. Do you have a paper trail? If not, how do we strategically exit?"`,
                        impact: "Equips the teen with critical thinking and ${term('Systemic Awareness', 'Systemic Awareness')}. Teaches self-advocacy and strategic retreat when an environment is fundamentally unsafe."
                    }
                ]
            },
            {
                id: "scenario-3",
                title: "The Unfair Failure",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
                context: "The teenager poured hundreds of hours into a college or scholarship application, but lost the spot due to blatant nepotism or factors entirely outside their control.",
                approaches: [
                    {
                        type: "Forced Positivity",
                        color: "rose",
                        advice: `"If you just try harder next time, you'll succeed! A positive mindset attracts positive outcomes. Don't give up!"`,
                        impact: "Causes extreme self-blame. If the failure was outside their control, telling them to 'try harder' implies the failure was their own fault because they weren't 'positive' enough."
                    },
                    {
                        type: "Cynical Reality",
                        color: "slate",
                        advice: `"Hard work is a myth. Only people with money and connections win. You're wasting your time trying to play a rigged game."`,
                        impact: "Destroys ${term('Intrinsic Motivation', 'Intrinsic Motivation')}. The teenager stops pursuing their passions and adopts a resentful, defeatist attitude towards life."
                    },
                    {
                        type: "Pragmatic Resilience",
                        color: "teal",
                        advice: `"You did absolutely everything right, and you still lost because the situation was inherently unfair. Take time to grieve this loss. When you're ready, we can figure out where to redirect your hard work."`,
                        impact: "Separates self-worth from uncontrollable outcomes. Teaches the teen that hard work doesn't guarantee success, but ${term('Pragmatic Resilience', 'Pragmatic Resilience')} allows them to survive the failure."
                    }
                ]
            }
        ];

        let currentIndex = 0;

        // Render the left-side navigation bar
        function renderNavigation() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            
            scenariosData.forEach((item, index) => {
                const btn = document.createElement('button');
                const isActive = index === currentIndex;
                
                btn.className = `w-full text-left p-4 mb-2 rounded-xl flex items-center gap-3 transition-all ${
                    isActive 
                    ? 'bg-slate-900 text-white shadow-md' 
                    : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 hover:border-slate-300'
                }`;
                
                btn.onclick = () => selectScenario(index);
                
                btn.innerHTML = `
                    <div class="${isActive ? 'text-teal-400' : 'text-slate-400'} flex-shrink-0">
                        ${item.icon}
                    </div>
                    <div>
                        <div class="font-semibold text-sm ${isActive ? 'text-white' : 'text-slate-800'}">${item.title}</div>
                        ${!item.isIntro ? `<div class="text-xs mt-0.5 opacity-70">Scenario ${index}</div>` : ''}
                    </div>
                `;
                
                container.appendChild(btn);
            });
        }

        // Handle switching between scenarios
        function selectScenario(index) {
            currentIndex = index;
            renderNavigation();
            
            const item = scenariosData[index];
            const display = document.getElementById('content-display');
            
            // If it's the intro page, render the static HTML
            if (item.isIntro) {
                display.innerHTML = item.content;
                return;
            }
            
            // Otherwise, build the dynamic Scenario page HTML
            const colors = {
                rose: { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-800', badge: 'bg-rose-100 text-rose-700' },
                slate: { bg: 'bg-slate-100', border: 'border-slate-300', text: 'text-slate-800', badge: 'bg-slate-200 text-slate-700' },
                teal: { bg: 'bg-teal-50', border: 'border-teal-200', text: 'text-teal-900', badge: 'bg-teal-100 text-teal-700' }
            };

            let approachesHtml = '';
            item.approaches.forEach(app => {
                const c = colors[app.color];
                approachesHtml += `
                    <div class="${c.bg} border ${c.border} rounded-2xl p-6 perspective-card relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full ${c.badge.split(' ')[0]}"></div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg ${c.text}">${app.type}</h3>
                            <span class="text-[10px] uppercase tracking-wider font-bold px-2 py-1 rounded-full ${c.badge}">Approach</span>
                        </div>
                        <div class="mb-4">
                            <h4 class="text-xs uppercase font-bold text-slate-400 mb-1 tracking-wider">What they say:</h4>
                            <p class="italic text-slate-700 font-medium">"${app.advice.replace(/"/g, '')}"</p>
                        </div>
                        <div class="pt-4 border-t border-black/5">
                            <h4 class="text-xs uppercase font-bold text-slate-400 mb-1 tracking-wider">Psychological Impact:</h4>
                            <p class="text-sm text-slate-600 leading-relaxed">${app.impact}</p>
                        </div>
                    </div>
                `;
            });

            display.innerHTML = `
                <div class="max-w-4xl mx-auto fade-in pb-10">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-200 text-slate-700 text-xs font-bold rounded-full uppercase tracking-wide mb-4">
                        Scenario ${index}
                    </div>
                    
                    <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-4">${item.title}</h2>
                    
                    <div class="bg-white border border-slate-200 rounded-xl p-6 mb-8 shadow-sm">
                        <h3 class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            The Situation
                        </h3>
                        <p class="text-lg text-slate-700 font-medium leading-relaxed">${item.context}</p>
                    </div>

                    <h3 class="text-xl font-bold text-slate-800 mb-6">How should we guide the teenager?</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${approachesHtml}
                    </div>

                    <div class="mt-12 pt-6 border-t border-slate-200 flex justify-between">
                        ${index > 0 
                            ? `<button onclick="selectScenario(${index - 1})" class="text-slate-500 hover:text-slate-800 font-medium flex items-center gap-2 px-4 py-2 hover:bg-slate-200 rounded-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Previous</button>` 
                            : `<div></div>`
                        }
                        
                        ${index < scenariosData.length - 1 
                            ? `<button onclick="selectScenario(${index + 1})" class="bg-slate-900 text-white hover:bg-slate-800 font-medium flex items-center gap-2 px-5 py-2 rounded-lg transition-colors shadow-md">Next Scenario <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>` 
                            : `<button onclick="selectScenario(0)" class="text-teal-600 hover:text-teal-800 font-medium flex items-center gap-2 px-4 py-2 hover:bg-teal-50 rounded-lg transition-colors">Back to Intro <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>`
                        }
                    </div>
                </div>
            `;

            // Auto-scroll to top on mobile view
            if (window.innerWidth < 768) {
                document.getElementById('content-display').scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // --- TOOLTIP LOGIC ---
        const tooltip = document.getElementById('global-tooltip');

        // Handle Mouse Hover (Desktop)
        document.addEventListener('mouseover', (e) => {
            if (e.target.classList.contains('highlight-term')) {
                const termKey = e.target.getAttribute('data-term');
                const definition = glossary[termKey];
                
                tooltip.innerHTML = `<strong class="block mb-1 text-teal-300 font-bold uppercase tracking-wider text-xs">${termKey}</strong><span class="leading-relaxed block">${definition}</span>`;
                tooltip.classList.remove('hidden');
                
                // Slight delay to allow CSS transition to kick in smoothly
                requestAnimationFrame(() => tooltip.classList.remove('opacity-0'));
            }
        });

        // Make the tooltip follow the mouse
        document.addEventListener('mousemove', (e) => {
            if (!tooltip.classList.contains('hidden')) {
                let x = e.clientX + 15;
                let y = e.clientY + 20;
                
                // Prevent the tooltip from going off the right side of the screen
                const rect = tooltip.getBoundingClientRect();
                if (x + rect.width > window.innerWidth) {
                    x = e.clientX - rect.width - 15;
                }
                
                // Prevent the tooltip from going off the bottom of the screen
                if (y + rect.height > window.innerHeight) {
                    y = e.clientY - rect.height - 15;
                }
                
                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
            }
        });

        // Hide the tooltip when the mouse leaves the word
        document.addEventListener('mouseout', (e) => {
            if (e.target.classList.contains('highlight-term')) {
                tooltip.classList.add('opacity-0');
                setTimeout(() => tooltip.classList.add('hidden'), 200);
            }
        });

        // Initialize Application
        window.onload = () => {
            renderNavigation();
            selectScenario(0);
        };
    </script>
</body>
</html>
